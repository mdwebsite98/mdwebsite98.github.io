<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDWEBSITE98 | Fashion Store</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="assets/css/style.css">
    
    </head>
<body>

    <header class="fashion-header">
        <div class="header-container">
            <div class="header-left">
                <button class="hamburger-menu" id="menuToggle">
                    <span></span><span></span><span></span>
                </button>
            </div>
            <div class="header-center">
                <a href="/" class="brand-logo">MDWEBSITE98</a>
            </div>
            <div class="header-right">
                <a href="#" class="header-icon"><i class="far fa-user"></i></a>
                <a href="#" class="header-icon cart-icon">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <section class="hero-split">
        <div class="swiper swiper-left">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1020&auto=format&fit=crop" alt="Fashion 1"></div>
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1539109132314-34a9c6686710?q=80&w=1000&auto=format&fit=crop" alt="Fashion 2"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
        
        <div class="swiper swiper-right">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=1000&auto=format&fit=crop" alt="Fashion 3"></div>
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=1000&auto=format&fit=crop" alt="Fashion 4"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="assets/js/script.js"></script>

</body>
</html>
